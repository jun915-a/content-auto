name: Auto Publish Articles

on:
  schedule:
    # 3時間ごとに実行（24時間で8回チェック、完成次第投稿）
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run publisher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          MEDIUM_API_TOKEN: ${{ secrets.MEDIUM_API_TOKEN }}
          MEDIUM_USER_ID: ${{ secrets.MEDIUM_USER_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Commit history
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add published_history.json || true
          git diff --staged --quiet || git commit -m "Update published history"
          git push || true
